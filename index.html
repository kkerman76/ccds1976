html<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CCDS Class of 1976</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>* { margin: 0; padding: 0; box-sizing: border-box; } body { background: #0e1a3d; font-family: Arial, sans-serif; color: #eef; }</style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useRef } = React;
    const N = "#1a2a5e", G = "#c9a84c";
    const iS = {width:"100%",padding:"8px 12px",background:"rgba(255,255,255,.08)",border:"1px solid rgba(201,168,76,.3)",borderRadius:6,color:"#eef",fontSize:14,boxSizing:"border-box"};
    const lS = {color:"#aab",fontSize:13,display:"block",marginBottom:4,fontWeight:"bold"};
    function Card({children,style={}}){return <div style={{background:"rgba(255,255,255,.06)",border:"1px solid rgba(201,168,76,.25)",borderRadius:10,padding:"18px 22px",marginBottom:14,...style}}>{children}</div>;}
    function SectionTitle({children}){return <h2 style={{color:G,fontFamily:"Georgia,serif",fontSize:22,textTransform:"uppercase",letterSpacing:1,marginBottom:4}}>{children}</h2>;}
    function Divider(){return <div style={{textAlign:"center",margin:"18px 0"}}><span style={{display:"inline-block",width:60,height:2,background:G,verticalAlign:"middle"}}/><span style={{display:"inline-block",width:8,height:8,borderRadius:"50%",background:G,margin:"0 8px",verticalAlign:"middle"}}/><span style={{display:"inline-block",width:60,height:2,background:G,verticalAlign:"middle"}}/></div>;}
    function Home(){return <div><SectionTitle>Welcome, Nighthawks!</SectionTitle><Divider/><p style={{color:"#dde",lineHeight:1.8,fontSize:15}}>Welcome to the official gathering place for the <strong style={{color:G}}>Cincinnati Country Day School Class of 1976</strong>. This site is your hub for the <strong style={{color:G}}>50th Reunion</strong> — reconnecting with classmates, sharing memories, and celebrating a half-century since graduation.</p><Card style={{marginTop:24}}><h3 style={{color:G,margin:"0 0 8px",fontFamily:"Georgia,serif"}}>Save the Date</h3><p style={{color:"#ccd",margin:0,fontSize:15}}><strong>September 18-19, 2026</strong><br/>Cincinnati Country Day School · 6905 Given Road · Cincinnati, OH 45243</p></Card></div>;}
    function C76(){return <div><SectionTitle>Class of 1976</SectionTitle><Divider/><img src="images/std01.jpg" alt="Save the Date" style={{width:"100%",borderRadius:8,marginBottom:16,border:`2px solid ${G}`}}/><img src="images/std03.jpg" alt="Weekend Schedule" style={{width:"100%",borderRadius:8,border:`2px solid ${G}`}}/></div>;}
    function Sched(){return <div><SectionTitle>Reunion Schedule</SectionTitle><Divider/><Card><h3 style={{color:G,margin:"0 0 12px",fontFamily:"Georgia,serif"}}>Friday, September 18</h3><div style={{color:"#dde",fontSize:15,lineHeight:2}}><p><strong>4:00 pm</strong> — Reception for Former Faculty and Staff</p><p><strong>5:30 pm</strong> — Centennial Reception</p><p><strong>7:00 pm</strong> — Homecoming Football Game — Country Day vs. Clermont Northeastern</p></div></Card><Card><h3 style={{color:G,margin:"0 0 12px",fontFamily:"Georgia,serif"}}>Saturday, September 19</h3><div style={{color:"#dde",fontSize:15,lineHeight:2}}><p><strong>10:00 am</strong> — Alumni Breakfast — Honoring the Class of 1976 and 50+ year alumni</p><p><strong>6:30 pm</strong> — Centennial Celebration Gala</p></div></Card></div>;}
    function Activity(){
      const [x,setX]=useState(null);
      return <div><SectionTitle>Recent Activity</SectionTitle><Divider/>
      <Card><div style={{display:"flex",alignItems:"center",gap:14,cursor:"pointer"}} onClick={()=>setX(x==="ben"?null:"ben")}><div style={{width:44,height:44,borderRadius:"50%",background:"linear-gradient(135deg,#2a3f7e,#3a5fae)",border:`2px solid ${G}`,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:"bold",color:"#fff",flexShrink:0}}>BL</div><div><div style={{color:G,fontWeight:"bold",fontSize:16}}>Ben Lowenthal '76</div></div><div style={{marginLeft:"auto",color:G}}>{x==="ben"?"▲":"▼"}</div></div>{x==="ben"&&<div style={{marginTop:16,paddingTop:16,borderTop:"1px solid rgba(201,168,76,.2)"}}><p style={{color:"#dde",fontSize:14,lineHeight:1.8}}>Ben Lowenthal '76 is a distinguished alumnus of Cincinnati Country Day School.</p><a href="https://www.linkedin.com/in/benlowenthal" target="_blank" rel="noreferrer" style={{color:"#7aafff",fontSize:14}}>View LinkedIn Profile</a></div>}</Card>
      <Card style={{padding:0,overflow:"hidden"}}><div style={{display:"flex",alignItems:"center",gap:14,cursor:"pointer",padding:"18px 22px"}} onClick={()=>setX(x==="jeff"?null:"jeff")}><img src="images/jeff.png" alt="Jeff Harrison" style={{width:52,height:52,borderRadius:"50%",objectFit:"cover",objectPosition:"top",border:`2px solid ${G}`,flexShrink:0}}/><div><div style={{color:G,fontWeight:"bold",fontSize:16}}>Jeffrey W. Harrison '76</div><div style={{color:"#ccd",fontSize:13}}>Award-winning poet · Author of six collections</div></div><div style={{marginLeft:"auto",color:G,paddingRight:4}}>{x==="jeff"?"▲":"▼"}</div></div>{x==="jeff"&&<div style={{padding:"0 22px 20px"}}><div style={{display:"flex",gap:18,marginBottom:14}}><img src="images/jeff.png" alt="Jeff Harrison" style={{width:120,borderRadius:8,border:`2px solid ${G}`,flexShrink:0,objectFit:"cover",maxHeight:150}}/><p style={{color:"#dde",fontSize:14,lineHeight:1.8}}>Jeff is an award-winning poet and author of six books including <em>Between Lakes</em> (2020), <em>Into Daylight</em> (2014, Dorset Prize), and <em>The Singing Underneath</em> (1987, National Poetry Series). He has received Guggenheim and NEA fellowships and appeared in <em>The New Yorker</em>, <em>The Paris Review</em>, and Best American Poetry. He lives in Massachusetts and remains a loyal CCDS supporter.</p></div></div>}</Card>
      </div>;
    }
    function Attending(){return <div><SectionTitle>Attending the Reunion</SectionTitle><Divider/><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>{["Michael Barach","Andrew Garvey","Jeff Harrison","Keith Kerman","Bill Kite","Steve Wilhelm"].map(n=><Card key={n} style={{padding:"12px 16px",marginBottom:0}}><span style={{color:"#eef"}}>✓ {n}</span></Card>)}</div></div>;}
    function Memoriam(){return <div><SectionTitle>In Memoriam</SectionTitle><Divider/><p style={{color:"#ccd",fontSize:14,marginBottom:18}}>We remember and honor our classmates who have passed.</p>{[{n:"Andrew Hough",y:"1958-2023"},{n:"Mark Lanier",y:"1958-2019"},{n:"Steve Marcum",y:"1958-2022"},{n:"Marc Mendenhall",y:"1959-2025"},{n:"Jay Stoehr",y:"1958-2024"},{n:"Todd Walker",y:"1958-2020"}].map(p=><Card key={p.n} style={{display:"flex",alignItems:"center",gap:16}}><div style={{width:44,height:44,borderRadius:"50%",background:`linear-gradient(135deg,${N},#2a3f7e)`,border:`2px solid ${G}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,flexShrink:0}}>🕊</div><div><div style={{color:"#eef",fontWeight:"bold",fontSize:16}}>{p.n}</div><div style={{color:G,fontSize:13}}>{p.y}</div></div></Card>)}</div>;}
    function Archive({loggedIn,user}){
      const [items,setItems]=useState([{id:1,title:"Senior Day",by:"Site Administrator",taken:"May 1976",sortKey:197605,caption:"Students at the outdoor buffet line during CCDS Senior Day, May 1976.",src:"images/senior.jpg",posted:"2026-03-03"}]);
      const [show,setShow]=useState(false);
      const [form,setForm]=useState({title:"",caption:"",month:"",src:null});
      const ref=useRef();
      function submit(){if(!form.title.trim()){alert("Please add a title.");return;}const sk=form.month?parseInt(form.month.replace("-","").slice(0,6)):999999;const mo=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];const taken=form.month?`${mo[parseInt(form.month.split("-")[1])-1]} ${form.month.split("-")[0]}`:"Unknown date";setItems(p=>[...p,{id:Date.now(),title:form.title.trim(),by:user||"Member",taken,sortKey:sk,caption:form.caption,src:form.src,posted:new Date().toISOString().slice(0,10)}].sort((a,b)=>a.sortKey-b.sortKey));setForm({title:"",caption:"",month:"",src:null});setShow(false);}
      return <div><SectionTitle>Digital Archive</SectionTitle><Divider/><p style={{color:"#ccd",fontSize:14,marginBottom:16}}>Photographs and articles in <strong style={{color:G}}>chronological order</strong>.</p>
      {loggedIn&&<button onClick={()=>setShow(s=>!s)} style={{background:show?"#444":G,color:show?"#eee":N,border:"none",borderRadius:6,padding:"10px 20px",fontWeight:"bold",fontSize:14,cursor:"pointer",marginBottom:20}}>{show?"Cancel":"+ Add to Archive"}</button>}
      {!loggedIn&&<p style={{color:"#aab",fontSize:13,fontStyle:"italic",marginBottom:16}}>Log in to contribute.</p>}
      {show&&loggedIn&&<Card style={{background:"rgba(26,42,94,.7)",marginBottom:24}}><h3 style={{color:G,marginTop:0}}>Add New Item</h3><div style={{display:"flex",flexDirection:"column",gap:12}}><div><label style={lS}>Title *</label><input style={iS} value={form.title} onChange={e=>setForm(p=>({...p,title:e.target.value}))}/></div><div><label style={lS}>Date Taken</label><input style={iS} type="month" value={form.month} onChange={e=>setForm(p=>({...p,month:e.target.value}))}/></div><div><label style={lS}>Caption</label><textarea style={{...iS,minHeight:70}} value={form.caption} onChange={e=>setForm(p=>({...p,caption:e.target.value}))}/></div><div><label style={lS}>Image</label><input ref={ref} type="file" accept="image/*" style={{color:"#eef"}} onChange={e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>setForm(p=>({...p,src:ev.target.result}));r.readAsDataURL(f);}}/></div><button onClick={submit} style={{background:G,color:N,border:"none",borderRadius:6,padding:"10px 20px",fontWeight:"bold",cursor:"pointer",alignSelf:"flex-start"}}>Submit</button></div></Card>}
      {items.map(it=><div key={it.id} style={{background:"rgba(255,255,255,.06)",border:"1px solid rgba(201,168,76,.25)",borderRadius:10,marginBottom:20,overflow:"hidden"}}>{it.src?<img src={it.src} alt={it.title} style={{width:"100%",maxHeight:400,objectFit:"cover",display:"block"}}/>:<div style={{height:80,background:"rgba(0,0,0,.3)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:32}}>🖼</div>}<div style={{padding:"14px 18px"}}><div style={{display:"flex",justifyContent:"space-between",flexWrap:"wrap",gap:6}}><h3 style={{color:"#eef",margin:0,fontFamily:"Georgia,serif"}}>{it.title}</h3><span style={{background:G,color:N,fontSize:11,fontWeight:"bold",borderRadius:20,padding:"2px 10px"}}>{it.taken}</span></div>{it.caption&&<p style={{color:"#ccd",fontSize:14,marginTop:8,lineHeight:1.6}}>{it.caption}</p>}<div style={{color:"#778",fontSize:12,marginTop:8}}>Posted by <strong style={{color:"#aab"}}>{it.by}</strong> · {it.posted}</div></div></div>)}
      </div>;
    }
    function AuthModal({onLogin,onClose}){
      const [mode,setMode]=useState("login");
      const [form,setForm]=useState({name:"",email:"",password:""});
      const users=[{name:"Site Administrator",email:"admin@ccds1976.org",password:"admin"},{name:"Keith Kerman",email:"kkerman76@example.com",password:"ccds1976"}];
      function go(){if(mode==="login"){const u=users.find(u=>u.email===form.email&&u.password===form.password);if(u){onLogin(u.name);onClose();}else alert("Try: admin@ccds1976.org / admin");}else{if(!form.name||!form.email||!form.password){alert("Fill all fields.");return;}onLogin(form.name);onClose();}}
      return <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.75)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:1000}} onClick={onClose}><div onClick={e=>e.stopPropagation()} style={{background:N,border:`2px solid ${G}`,borderRadius:12,padding:32,width:340,maxWidth:"90vw"}}><h2 style={{color:G,fontFamily:"Georgia,serif",marginTop:0}}>{mode==="login"?"Log In":"Register"}</h2>{mode==="register"&&<div style={{marginBottom:14}}><label style={lS}>Name</label><input style={iS} value={form.name} onChange={e=>setForm(p=>({...p,name:e.target.value}))}/></div>}<div style={{marginBottom:14}}><label style={lS}>Email</label><input style={iS} type="email" value={form.email} onChange={e=>setForm(p=>({...p,email:e.target.value}))}/></div><div style={{marginBottom:20}}><label style={lS}>Password</label><input style={iS} type="password" value={form.password} onChange={e=>setForm(p=>({...p,password:e.target.value}))}/></div><button onClick={go} style={{width:"100%",background:G,color:N,border:"none",borderRadius:6,padding:"11px 0",fontWeight:"bold",fontSize:15,cursor:"pointer"}}>{mode==="login"?"Log In":"Register"}</button><p style={{color:"#aab",fontSize:13,textAlign:"center",marginTop:14}}>{mode==="login"?<span>No account? <span onClick={()=>setMode("register")} style={{color:G,cursor:"pointer"}}>Register</span></span>:<span>Have account? <span onClick={()=>setMode("login")} style={{color:G,cursor:"pointer"}}>Log In</span></span>}</p></div></div>;
    }
    const TABS=[{id:"home",l:"Home"},{id:"c76",l:"Class of 1976"},{id:"sched",l:"Reunion Schedule"},{id:"archive",l:"Digital Archive"},{id:"activity",l:"Recent Activity"},{id:"attending",l:"Attending Reunion"},{id:"memoriam",l:"In Memoriam"}];
    function App(){
      const [tab,setTab]=useState("home");
      const [loggedIn,setLoggedIn]=useState(false);
      const [user,setUser]=useState(null);
      const [showAuth,setShowAuth]=useState(false);
      return <div style={{minHeight:"100vh",background:"linear-gradient(160deg,#0e1a3d 0%,#1a2a5e 50%,#0e1a3d 100%)",color:"#eef",fontFamily:"Arial,sans-serif"}}>
        <div style={{background:"linear-gradient(90deg,#1a2a5e,#0e1a3d)",borderBottom:`3px solid ${G}`,padding:"20px 24px",display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:12}}>
          <div><div style={{fontSize:11,color:G,letterSpacing:3,textTransform:"uppercase",marginBottom:2}}>Cincinnati Country Day School</div><h1 style={{margin:0,fontFamily:"Georgia,serif",fontSize:26,color:"#fff"}}>Class of 1976</h1><div style={{fontSize:12,color:"#aab",marginTop:2}}>50th Reunion · September 2026</div></div>
          <div>{loggedIn?<><span style={{color:G,fontSize:13}}>👤 {user}</span> <button onClick={()=>{setLoggedIn(false);setUser(null);}} style={{background:"transparent",border:`1px solid ${G}`,color:G,borderRadius:6,padding:"6px 14px",cursor:"pointer",fontSize:13}}>Log Out</button></>:<button onClick={()=>setShowAuth(true)} style={{background:G,color:N,border:"none",borderRadius:6,padding:"8px 18px",cursor:"pointer",fontWeight:"bold",fontSize:13}}>Log In</button>}</div>
        </div>
        <div style={{background:"rgba(0,0,0,.3)",borderBottom:"1px solid rgba(201,168,76,.2)",padding:"10px 24px",display:"flex",flexWrap:"wrap",gap:8}}>
          {TABS.map(t=><button key={t.id} onClick={()=>setTab(t.id)} style={{background:tab===t.id?G:"transparent",color:tab===t.id?N:"#dde",border:`1px solid ${tab===t.id?G:"rgba(201,168,76,.3)"}`,borderRadius:6,padding:"7px 14px",cursor:"pointer",fontSize:13,fontWeight:tab===t.id?"bold":"normal",whiteSpace:"nowrap"}}>{t.l}</button>)}
        </div>
        <div style={{maxWidth:760,margin:"0 auto",padding:"32px 20px"}}>
          {tab==="home"&&<Home/>}{tab==="c76"&&<C76/>}{tab==="sched"&&<Sched/>}{tab==="archive"&&<Archive loggedIn={loggedIn} user={user}/>}{tab==="activity"&&<Activity/>}{tab==="attending"&&<Attending/>}{tab==="memoriam"&&<Memoriam/>}
        </div>
        <div style={{textAlign:"center",padding:"24px 20px",borderTop:"1px solid rgba(201,168,76,.15)",color:"#556"}}><div style={{color:G,fontFamily:"Georgia,serif",fontSize:14,marginBottom:4}}>CCDS Class of 1976</div><div style={{fontSize:12}}>ccds1976.org · 6905 Given Road, Cincinnati OH 45243</div></div>
        {showAuth&&<AuthModal onLogin={n=>{setLoggedIn(true);setUser(n);}} onClose={()=>setShowAuth(false)}/>}
      </div>;
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
